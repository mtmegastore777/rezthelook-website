<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Payments Connected - RezTheLook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #0D1B3E;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background-color: #FAF8F4;
      border-radius: 24px;
      border: 1px solid rgba(212, 175, 55, 0.35);
      width: 100%;
      max-width: 440px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    .icon-ring {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background-color: #ecfdf3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-ring svg { display: block; }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #0D1B3E;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    .message {
      font-size: 15px;
      color: #555;
      line-height: 1.65;
      margin-bottom: 28px;
    }

    .cta {
      display: block;
      width: 100%;
      background-color: #0D1B3E;
      color: #ffffff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 16px 20px;
      border-radius: 14px;
      transition: background-color 0.15s ease, transform 0.05s ease;
    }

    .cta:hover { background-color: #142347; }
    .cta:active { transform: scale(0.99); }

    .subtext {
      font-size: 13px;
      color: #999;
      margin-top: 16px;
    }

    .divider {
      height: 1px;
      background-color: rgba(212, 175, 55, 0.3);
      margin: 28px 0 20px;
    }

    .wordmark {
      font-family: 'Lora', Georgia, serif;
      font-weight: 700;
      font-size: 18px;
      color: #0D1B3E;
      letter-spacing: 0.01em;
    }

    .wordmark .gold { color: #D4AF37; }

    @media (max-width: 420px) {
      .card { padding: 32px 22px; border-radius: 20px; }
      h1 { font-size: 23px; }
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <div class="icon-ring" aria-hidden="true">
      <!-- Green success checkmark -->
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" fill="#22c55e" />
        <path d="M20 33.5 L28.5 42 L44 25" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      </svg>
    </div>

    <h1>Payments Connected!</h1>

    <p class="message">
      Your Stripe account is all set. Return to the RezTheLook app to start accepting deposits and cancellation fees from your clients.
    </p>

    <a class="cta" href="rezthelook://stripe-return">Open RezTheLook App</a>

    <p class="subtext">After returning to the app, we&rsquo;ll verify your account status automatically.</p>

    <div class="divider"></div>

    <div class="wordmark">Rez<span class="gold">The</span>Look</div>
  </main>
</body>
</html>
